name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: >-
          actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: >-
          actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          cache: true
          cache-key: cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Node.js 22.14.0
        uses: >-
          actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build native addon
        run: >-
          npx napi build --platform --release
          --js native.js --dts native.d.ts

      - name: Lint types (Biome)
        run: pnpm lint:js

      - name: Run Rust tests
        run: cargo test

      - name: Run JS tests
        run: pnpm test
