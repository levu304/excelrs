name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm_dir: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            npm_dir: linux-x64-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            npm_dir: win32-x64-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: >-
          actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Rust
        uses: >-
          actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659
        with:
          cache: true
          cache-key: cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Node.js 22.14.0
        uses: >-
          actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build native addon
        run: npx napi build --platform --release --js native.js

      - name: Run Rust tests
        run: cargo test

      - name: Run JS tests
        run: pnpm test
      - name: Streaming smoke test
        run: node scripts/streaming-smoke.cjs

      - name: Upload native artifact
        uses: >-
          actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.npm_dir }}
          path: excelrs.*.node

  publish:
    needs: [build]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: >-
          actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Install Node.js 22.14.0
        uses: >-
          actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22.14.0

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@11

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download platform artifacts
        uses: >-
          actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: npm

      - name: Create platform package.json files
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cat > npm/darwin-arm64/package.json <<EOF
          {
            "name": "@levu304/excelrs-darwin-arm64",
            "version": "$VERSION",
            "os": ["darwin"],
            "cpu": ["arm64"],
            "main": "excelrs.darwin-arm64.node",
            "repository": "https://github.com/levu304/excelrs"
          }
          EOF
          cat > npm/linux-x64-gnu/package.json <<EOF
          {
            "name": "@levu304/excelrs-linux-x64-gnu",
            "version": "$VERSION",
            "os": ["linux"],
            "cpu": ["x64"],
            "main": "excelrs.linux-x64-gnu.node",
            "repository": "https://github.com/levu304/excelrs"
          }
          EOF
          cat > npm/win32-x64-msvc/package.json <<EOF
          {
            "name": "@levu304/excelrs-win32-x64-msvc",
            "version": "$VERSION",
            "os": ["win32"],
            "cpu": ["x64"],
            "main": "excelrs.win32-x64-msvc.node",
            "repository": "https://github.com/levu304/excelrs"
          }
          EOF
          echo "Platform package.json files created"

      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public) || exit 1
          done

      - name: Publish to npm (main package)
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.optionalDependencies = {
              '@levu304/excelrs-darwin-arm64': pkg.version,
              '@levu304/excelrs-linux-x64-gnu': pkg.version,
              '@levu304/excelrs-win32-x64-msvc': pkg.version
            };
            require('fs').writeFileSync(
            './package.json',
            JSON.stringify(pkg, null, 2) + '\n'
          );
          "
          npm publish --access public

      - name: Verify all 4 packages on npm
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          for pkg in @levu304/excelrs \
                     @levu304/excelrs-darwin-arm64 \
                     @levu304/excelrs-linux-x64-gnu \
                     @levu304/excelrs-win32-x64-msvc; do
            for attempt in 1 2 3 4 5; do
              published=$(npm view "$pkg@$VERSION" version \
                2>/dev/null || echo "MISSING")
              if [ "$published" = "$VERSION" ]; then
                echo "OK: $pkg@$VERSION"
                break
              fi
              echo "  [attempt $attempt] $pkg@$VERSION" \
                "not yet visible (got: $published)"
              sleep 3
            done
            published=$(npm view "$pkg@$VERSION" version \
              2>/dev/null || echo "MISSING")
            if [ "$published" != "$VERSION" ]; then
              echo "FAIL: $pkg@$VERSION not on npm" \
                "after 5 retries (got: $published)"
              exit 1
            fi
          done

      - name: Functional smoke test
        timeout-minutes: 2
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          npm init -y > /dev/null 2>&1
          npm install --no-save "@levu304/excelrs@$VERSION" 2>&1 | tail -3
          node -e "
            const { Workbook } = require('@levu304/excelrs');
            const wb = new Workbook();
            const ws = wb.addWorksheet('test');
            ws.addRow([1, 2, 3]);
            ws.addRow(['x', 'y', 'z']);
            ws.addRow(['p', 'q', 'r']);
            const style = {
              font: { bold: true },
              fill: { kind: 'solid', foreground: 'FFFF0000' }
            };
            ws.setCellStyle(1, 2, style);
            // Row-level style (read-path gap closed by this change).
            ws.getRow(3).style = {
              font: { bold: true, color: 'FFFF0000' },
              fill: { kind: 'solid', foreground: 'FFFFFFFF' }
            };
            // Merge (writer emits <mergeCells> since v0.5.0; reader now
            // restores it — read-path gap closed by this change).
            ws.mergeCells('B2:D2');
            wb.xlsx.write()
              .then(buf => {
                if (buf.length < 100) {
                  throw new Error(
                    'xlsx too small: ' + buf.length
                  );
                }
                console.log('✓ native binding works, xlsx size:', buf.length);
                const wb2 = new Workbook();
                return wb2.xlsx.read(buf).then(() => {
                  const ws2 = wb2.getWorksheet('test');
                  const s = ws2.getCellByRc(1, 2).style;
                  if (!s || !s.font || s.font.bold !== true) {
                    throw new Error(
                      'style lost on read: font.bold not preserved'
                    );
                  }
                  if (!s.fill || s.fill.kind !== 'solid' ||
                      s.fill.foreground !== 'FFFF0000') {
                    const got = s.fill &&
                      s.fill.kind + '/' + s.fill.foreground;
                    throw new Error(
                      'style lost on read: fill not preserved' +
                      ' (got ' + got + ')'
                    );
                  }
                  console.log('✓ styled xlsx round-trips through read path');
                  // Merged range must survive the read path.
                  const merges = ws2.mergedRanges || [];
                  if (!merges.includes('B2:D2')) {
                    throw new Error(
                      'merge lost on read: mergedRanges=' +
                      JSON.stringify(merges)
                    );
                  }
                  console.log('✓ merged range round-trips through read path');
                  // Row-level style must survive the read path.
                  const rs = ws2.getRow(3).style;
                  if (!rs || !rs.font || rs.font.bold !== true ||
                      rs.font.color !== 'FFFF0000') {
                    throw new Error(
                      'row style lost on read: ' + JSON.stringify(rs)
                    );
                  }
                  if (!rs.fill || rs.fill.foreground !== 'FFFFFFFF') {
                    throw new Error(
                      'row style lost on read: fill=' + JSON.stringify(rs.fill)
                    );
                  }
                  console.log('✓ row style round-trips through read path');
                });
              })
              .catch(err => {
                console.error('FAIL:', err.message);
                process.exit(1);
              });
          "
          rm -rf "$SMOKE_DIR"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --generate-notes
