name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            npm_dir: darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            npm_dir: linux-x64-gnu
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            npm_dir: win32-x64-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native addon
        run: npx napi build --platform --release --js native.js

      - name: Run Rust tests
        run: cargo test

      - name: Run JS tests
        run: pnpm test

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_dir }}
          path: excelrs.*.node

  publish:
    needs: [build]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: npm

      - name: Create platform package.json files
        run: |
          VERSION=$(node -p "require('./package.json').version")
          cat > npm/darwin-arm64/package.json <<EOF
          { "name": "@levu304/excelrs-darwin-arm64", "version": "$VERSION", "os": ["darwin"], "cpu": ["arm64"], "main": "excelrs.darwin-arm64.node" }
          EOF
          cat > npm/linux-x64-gnu/package.json <<EOF
          { "name": "@levu304/excelrs-linux-x64-gnu", "version": "$VERSION", "os": ["linux"], "cpu": ["x64"], "main": "excelrs.linux-x64-gnu.node" }
          EOF
          cat > npm/win32-x64-msvc/package.json <<EOF
          { "name": "@levu304/excelrs-win32-x64-msvc", "version": "$VERSION", "os": ["win32"], "cpu": ["x64"], "main": "excelrs.win32-x64-msvc.node" }
          EOF
          echo "Platform package.json files created"

      - name: Publish platform packages
        run: |
          for dir in npm/*/; do
            (cd "$dir" && npm publish --access public) || exit 1
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (main package)
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify all 4 packages on npm
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          for pkg in @levu304/excelrs \
                     @levu304/excelrs-darwin-arm64 \
                     @levu304/excelrs-linux-x64-gnu \
                     @levu304/excelrs-win32-x64-msvc; do
            published=$(npm view "$pkg@$VERSION" version 2>/dev/null || echo "MISSING")
            if [ "$published" != "$VERSION" ]; then
              echo "FAIL: $pkg@$VERSION not on npm (got: $published)"
              exit 1
            fi
            echo "OK: $pkg@$VERSION"
          done

      - name: Functional smoke test
        timeout-minutes: 2
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          npm init -y > /dev/null 2>&1
          npm install --no-save "@levu304/excelrs@$VERSION" 2>&1 | tail -3
          node -e "
            const { Workbook } = require('@levu304/excelrs');
            const wb = new Workbook();
            const ws = wb.addWorksheet('test');
            ws.addRow([1, 2, 3]);
            ws.setCellStyle(1, 2, { font: { bold: true } });
            wb.xlsx.write()
              .then(buf => {
                if (buf.length < 100) throw new Error('xlsx too small: ' + buf.length);
                console.log('✓ native binding works, xlsx size:', buf.length);
              })
              .catch(err => {
                console.error('FAIL:', err.message);
                process.exit(1);
              });
          "
          rm -rf "$SMOKE_DIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
